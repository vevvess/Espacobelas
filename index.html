<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bella App</title>
    <meta name="cosine-app-id" content="bella-app-v1" />
    <meta name="cosine-sentinel" content="BELLA_SALON_APP_SENTINEL::STATIC_ONLY::2025-10-18::V1" />
    <meta name="cosine-preview-url" content="/" />
    <!-- Os campos abaixo serão preenchidos quando o repositório for informado -->
    <meta name="cosine-repo-url" content="" />
    <meta name="cosine-repo-branch" content="" />
    <meta name="cosine-repo-subpath" content="" />
    <style>
      .embed-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #fff;
      }
      .embed-iframe {
        border: 0;
        width: 100%;
        height: 100%;
      }
      /* Evita espaçamento default no body quando usamos iframe */
      html, body { margin: 0; padding: 0; height: 100%; }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!--
      Regra simples:
      - Static-only: ignorar Vercel e usar sempre o preview estático.
      - Fora de cosine.page (dev/local ou build): tenta carregar via Vite/TSX; se falhar, usa preview estático.
    -->
    <script type="module">
      const root = document.getElementById("root");
      const isCosine = location.hostname.endsWith(".cosine.page");
      const params = new URLSearchParams(location.search);
      const VERCEL_URL = "https://espaco-five.vercel.app";

      async function loadFallback() {
        const loadScript = (src) =>
          new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = src;
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });

        try {
          await loadScript("/public/fallback-preview.js");
          if (window.__runFallbackPreview) {
            const target = document.getElementById("root") || document.body;
            window.__runFallbackPreview(target);
          } else {
            document.body.textContent = "Falha ao inicializar o preview estático.";
          }
        } catch (e) {
          console.error("Erro ao carregar o preview estático:", e);
          document.body.textContent = "Não foi possível carregar o app ou o preview estático.";
        }
      }

      if (isCosine) {
        // Static-only: sempre usar o preview estático, ignorando Vercel
        await loadFallback();
      } else {
        // Dev/local: tenta carregar a app real via Vite. Se falhar, cai no fallback.
        try {
          await import("/src/main.tsx");
        } catch (err) {
          console.warn("Vite/TSX indisponível. Carregando preview estático...", err);
          await loadFallback();
        }
      }
    </script>
  </body>
</html>
