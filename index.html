<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- BELLA_SALON_APP_SENTINEL::STATIC_ONLY::2025-10-18::V1 -->
    <meta name="cosine-app-id" content="BELLA_SALON_APP_SENTINEL::STATIC_ONLY::2025-10-18::V1" />
    <title>Bella App</title>
    <style>
      .embed-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #fff;
      }
      .embed-iframe {
        border: 0;
        width: 100%;
        height: 100%;
      }
      /* Evita espaçamento default no body quando usamos iframe */
      html, body { margin: 0; padding: 0; height: 100%; }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!--
      Modo estático somente:
      - Ignora Vercel em todos os ambientes.
      - Sempre carrega o preview estático.
    -->
    <script type="module">
      const root = document.getElementById("root");

      async function loadFallback() {
        const loadScript = (src) =>
          new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = src;
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });

        try {
          await loadScript("/public/fallback-preview.js");
          if (window.__runFallbackPreview) {
            const target = document.getElementById("root") || document.body;
            window.__runFallbackPreview(target);
          } else {
            document.body.textContent = "Falha ao inicializar o preview estático.";
          }
        } catch (e) {
          console.error("Erro ao carregar o preview estático:", e);
          document.body.textContent = "Não foi possível carregar o app ou o preview estático.";
        }
      }

      await loadFallback();
    </script>
  </body>
</html>
