<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bella App</title>
    <style>
      html, body, #root { height: 100%; margin: 0; }
      .embed-frame { border: 0; width: 100%; height: 100vh; display: block; }
      .fallback-center { height: 100%; display: flex; align-items: center; justify-content: center; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="module">
      const root = document.getElementById("root");
      const isCosinePreview = typeof location !== "undefined" && location.hostname.endsWith("cosine.page");

      // 1) No ambiente de preview daqui, embede o app do Vercel para ficar 100% idêntico visualmente
      if (isCosinePreview) {
        const iframe = document.createElement("iframe");
        iframe.className = "embed-frame";
        iframe.src = "https://builder-zenith-landing-7s6sy5e2j-weslleys-projects-03133434.vercel.app/dashboard";
        iframe.referrerPolicy = "no-referrer";
        iframe.loading = "eager";
        root.appendChild(iframe);
      } else {
        // 2) Ambiente local: tenta carregar o app via Vite/TSX normalmente
        try {
          await import("/src/main.tsx");
        } catch (err) {
          console.warn("Vite/TSX indisponível neste preview. Carregando preview estático...", err);

          const loadScript = (src) =>
            new Promise((resolve, reject) => {
              const s = document.createElement("script");
              s.src = src;
              s.onload = resolve;
              s.onerror = reject;
              document.head.appendChild(s);
            });

          try {
            await loadScript("/public/fallback-preview.js");
            if (window.__runFallbackPreview) {
              window.__runFallbackPreview(root);
            } else {
              root.innerHTML = '<div class="fallback-center">Falha ao inicializar o preview estático.</div>';
            }
          } catch (e) {
            console.error("Erro ao carregar o preview estático:", e);
            root.innerHTML = '<div class="fallback-center">Não foi possível carregar o app ou o preview estático.</div>';
          }
        }
      }
    </script>
  </body>
</html>
