<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="cosine-app-id" content="bella-app-v1" />
    <title>Bella App</title>
    <style>
      .embed-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #fff;
      }
      .embed-iframe {
        border: 0;
        width: 100%;
        height: 100%;
      }
      /* Evita espaçamento default no body quando usamos iframe */
      html, body { margin: 0; padding: 0; height: 100%; }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!--
      Regra simples:
      - Em cosine.page: incorpora o app real hospedado no Vercel via iframe (visual e funcional 100% iguais).
      - Fora de cosine.page (dev/local ou build): carrega o app normalmente via Vite/TSX.
      - Se Vite falhar (ex.: só arquivos estáticos), carrega preview estático.
    -->
    <script type="module">
      const root = document.getElementById("root");
      const isCosine = location.hostname.endsWith(".cosine.page");
      const params = new URLSearchParams(location.search);
      const wantsFallback = params.get("fallback") === "1";
      const VERCEL_URL = "https://espaco-five.vercel.app";

      function embedVercel(url) {
        const container = document.createElement("div");
        container.className = "embed-container";
        const iframe = document.createElement("iframe");
        iframe.className = "embed-iframe";
        iframe.src = url;
        iframe.allow = "clipboard-write; clipboard-read; fullscreen";
        container.appendChild(iframe);
        root.replaceWith(container);
      }

      async function loadFallback() {
        const loadScript = (src) =>
          new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = src;
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });

        try {
          // Tenta carregar uma versão segura e mínima primeiro
          try {
            await loadScript("/public/fallback-preview-safe.js");
          } catch (e) {
            // ignora; pode não existir ainda
          }

          // Se a função não foi definida, cai para o fallback tradicional
          if (!window.__runFallbackPreview) {
            await loadScript("/public/fallback-preview.js");
          }

          if (window.__runFallbackPreview) {
            const target = document.getElementById("root") || document.body;
            window.__runFallbackPreview(target);
          } else {
            document.body.textContent = "Falha ao inicializar o preview estático.";
          }
        } catch (e) {
          console.error("Erro ao carregar o preview estático:", e);
          document.body.textContent = "Não foi possível carregar o app ou o preview estático.";
        }
      }

      if (isCosine) {
        // Em cosine.page: agora incorporamos SEMPRE o app Vercel por padrão.
        // Quer forçar o preview estático? Use ?fallback=1
        if (!wantsFallback) {
          embedVercel(VERCEL_URL);
        } else {
          await loadFallback();
        }
      } else {
        // Dev/local: tenta carregar a app real via Vite. Se falhar, cai no fallback.
        try {
          await import("/src/main.tsx");
        } catch (err) {
          console.warn("Vite/TSX indisponível. Carregando preview estático...", err);
          await loadFallback();
        }
      }
    </script>
  </body>
</html>
