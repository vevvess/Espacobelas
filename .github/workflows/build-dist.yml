name: Build and Commit dist

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_ref:
        description: "Branch/tag para buildar (ex.: main ou cosine/refactor/app-edit-kli5fx)"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Evita rodar prisma generate no postinstall (não é necessário p/ build front-end)
      PRISMA_SKIP_POSTINSTALL: "1"
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.build_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        env:
          VITE_DATABASE_URL: ${{ secrets.VITE_DATABASE_URL }}
        run: npm run build

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

      - name: Commit dist back to repo
        env:
          BRANCH_NAME: ${{ inputs.build_ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Sincroniza com a branch remota para evitar non-fast-forward
          git fetch origin "$BRANCH_NAME"
          git checkout "$BRANCH_NAME"
          git pull --rebase origin "$BRANCH_NAME" || true
          git add -f dist
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(ci): build dist [skip ci]"
            git push origin HEAD:"$BRANCH_NAME"
          fi